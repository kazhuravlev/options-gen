name: Go

on:
  pull_request:
  push:
    tags: [ '*' ]
    branches: [ '**' ]

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.4.0
          install-mode: 'goinstall'

  build:
    name: Test on golang ${{ matrix.go_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go_version:
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.26"
        os: [ ubuntu-latest, macOS-latest ]

    steps:
      - name: Set up Go ${{ matrix.go_version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go_version }}
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get dependencies
        run: |
          go mod download

      - name: Build
        run: |
          go build -v -o /dev/null ./cmd/options-gen

      - name: Run tests
        run: go test -v -race -coverprofile coverage.txt -covermode atomic ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  bench-and-fuzz:
    name: Bench and fuzz on golang 1.26
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Get dependencies
        run: go mod download

      - name: Run benchmarks
        run: go test -run '^$' -bench . -benchmem ./internal/generator

      - name: Fuzz check default values
        run: go test -run '^$' -fuzz '^FuzzCheckDefaultValue$' -fuzztime=10s -timeout=30s ./internal/generator

      - name: Fuzz normalize type name
        run: go test -run '^$' -fuzz '^FuzzNormalizeTypeName$' -fuzztime=10s -timeout=30s ./internal/generator

      - name: Fuzz format comment
        run: go test -run '^$' -fuzz '^FuzzFormatComment$' -fuzztime=10s -timeout=30s ./internal/generator

      - name: Fuzz find import path
        run: go test -run '^$' -fuzz '^FuzzFindImportPath$' -fuzztime=10s -timeout=30s ./internal/generator
